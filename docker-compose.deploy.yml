# Overlay for running a prebuilt image instead of building locally. Used by
# scripts/deploy.sh and the CI delivery stage:
#
#   API_IMAGE=ghcr.io/<owner>/iloveshopping:<sha> \
#     docker compose -f docker-compose.yml -f docker-compose.deploy.yml up -d --no-build
services:
  api:
    image: ${API_IMAGE:?set API_IMAGE to the image tag to deploy}
