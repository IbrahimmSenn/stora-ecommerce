services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-mystore}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-mystore}"]
      interval: 2s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-mystore}?sslmode=disable",
        "up",
      ]

  seed:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./migrations/seed.sql:/seed.sql:ro
    entrypoint:
      [
        "sh",
        "-c",
        "PGPASSWORD=${POSTGRES_PASSWORD:-secret} psql -h db -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-mystore} -f /seed.sql",
      ]

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-mystore}?sslmode=disable
    ports:
      - "8080:8080"

volumes:
  pgdata:
