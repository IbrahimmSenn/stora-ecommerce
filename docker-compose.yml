services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-mystore}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-mystore}"]
      interval: 2s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-mystore}?sslmode=disable",
        "up",
      ]

  seed:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./migrations:/migrations:ro
    entrypoint:
      [
        "sh",
        "-c",
        "PGPASSWORD=${POSTGRES_PASSWORD:-secret} psql -h db -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-mystore} -f /migrations/seed.sql",
      ]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

  # Optional shared cache + rate-limit store for running multiple API replicas.
  # Off by default (single binary uses in-memory). Enable with:
  #   docker compose --profile scale up
  # and set REDIS_URL=redis://redis:6379/0 in the api environment.
  redis:
    image: redis:7-alpine
    profiles: ["scale"]
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  # Optional DB browser — start with `docker compose --profile tools up -d adminer`.
  # Not part of the default lifecycle.
  adminer:
    image: adminer:5
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: nette

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-mystore}?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      UPLOAD_DIR: /app/uploads
      TLS_ENABLED: "true"
      TLS_PORT: "8443"
      TLS_CERT_FILE: /app/certs/server.crt
      TLS_KEY_FILE: /app/certs/server.key
    volumes:
      - uploads:/app/uploads
    ports:
      - "8080:8080"
      - "8443:8443"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/ready"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  uploads:
