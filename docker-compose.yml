services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mystore
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mystore"]
      interval: 2s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://admin:secret@db:5432/mystore?sslmode=disable",
        "up",
      ]

  seed:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./migrations/seed.sql:/seed.sql:ro
    entrypoint:
      [
        "sh",
        "-c",
        "PGPASSWORD=secret psql -h db -U admin -d mystore -f /seed.sql",
      ]

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://admin:secret@db:5432/mystore?sslmode=disable
      JWT_SECRET: change-me-to-a-strong-secret-in-production
      BCRYPT_COST: "10"
      PORT: "8080"
      BASE_URL: "http://localhost:8080"
    ports:
      - "8080:8080"

volumes:
  pgdata:
