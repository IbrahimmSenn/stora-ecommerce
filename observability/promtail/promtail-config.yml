# Ships container logs to Loki via the Docker API (only the socket is
# mounted). Each stream is labeled with its compose service name; the api
# service logs JSON (LOG_FORMAT=json), so level/msg are parsed into labels
# Grafana can filter on.
server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: project
    pipeline_stages:
      # api logs are slog JSON; surface the level as a label for fast queries.
      # Non-JSON lines (other containers) pass through unparsed.
      - match:
          selector: '{service="api"}'
          stages:
            - json:
                expressions:
                  level: level
                  msg: msg
            - labels:
                level:
